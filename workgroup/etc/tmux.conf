# System tmux config for sbx sandboxes. Symlinked to /etc/tmux.conf by
# postinstall.sh so every tmux session inside the VM picks it up.
#
# Derived from the host config at ~/.tmux.conf, minus anything that needs
# external plugins (tpm, catppuccin, resurrect, continuum) or deprecated
# options (status-utf8, utf8 — removed in tmux 2.2+).

# Propagate UTF-8 to pane children even if tmux was started with a stale env.
set-environment -g LANG C.UTF-8
set-environment -g LC_ALL C.UTF-8

set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"
set-option -ga terminal-overrides ",screen-256color:Tc"

set -g mouse on

unbind r
bind r source-file /etc/tmux.conf \; display "tmux.conf reloaded"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# workgroup assigns pane titles per agent; keep them stable.
set -g allow-rename off
set -g automatic-rename off
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

set -g status-left-length 40
set -g status-left "#[bold] #S #[default]| "
set -g status-right "#{?client_prefix,^B ,}%H:%M "
